<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 MBTI 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div id="start-screen" class="screen active">
            <h1 class="main-title">MBTI 성향 검사</h1>
            <p class="sub-desc">총 12개의 문항을 통해 당신의 숨겨진 성향을 심층 분석합니다.</p>
            <button class="primary-btn" onclick="goToNameScreen()">시작하기</button>
        </div>

        <div id="name-screen" class="screen">
            <h1>당신의 이름은?</h1>
            <p>분석 보고서에 기록될 이름을 입력해주세요.</p>
            <input type="text" id="user-name" placeholder="이름 입력" autocomplete="off" maxlength="10">
            <button class="primary-btn" onclick="startQuiz()">검사 시작</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="progress-info">
                <span id="progress-text">1 / 12</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            
            <div id="question-area">
                <h2 id="question-text" class="question-text">질문 내용</h2>
                <div class="answer-label-container">
                    <span class="label left">그렇다</span>
                    <span class="label right">아니다</span>
                </div>
                <div id="answer-buttons" class="likert-buttons">
                    </div>
            </div>
        </div>

        <div id="end-screen" class="screen">
            <div class="icon">✅</div>
            <h1>검사 완료</h1>
            <p>모든 답변이 기록되었습니다.<br>이제 당신의 성향을 확인할 준비가 되었습니다.</p>
            <button class="primary-btn" onclick="showResult()">결과 분석 보고서 보기</button>
        </div>

        <div id="result-screen" class="screen">
            <h1>분석 결과</h1>
            <p><strong id="result-user" class="highlight">사용자</strong>님의 성향은</p>
            <div id="result-mbti" class="mbti-type">ESTJ</div>
            <p id="result-desc" class="result-desc">성향에 대한 세부 설명입니다.</p>
            <button class="home-btn" onclick="goHome()">메인으로</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
